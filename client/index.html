<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>SGA App - Gestão de Agendamentos</title>    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

    <!-- 🚀 PRELOAD LOGO -->
    <link rel="preload" as="image" href="/logo.webp" />

    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>

  <body>
    <!-- ⚡ LOGO IMEDIATA -->
    <img
      id="preload-logo"
      src="/logo.webp"
      alt="SGA App"
      style="position:absolute; top:20px; left:20px; width:180px; z-index:9999;"
    />

    <div id="root"></div>

    <script>
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const logo = document.getElementById('preload-logo');
          if (logo) logo.remove();
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
